<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Todo List</h1>
            <p class="subtitle">Управляй своими задачами</p>
        </header>

        <section class="add-todo">
            <form id="todoForm">
                <input type="text" id="title" placeholder="Название задачи" required>
                <input type="text" id="description" placeholder="Описание (необязательно)">
                <button type="submit">Добавить</button>
            </form>
        </section>

        <section class="stats">
            <div class="stat">
                <span id="totalCount">0</span>
                <label>Всего</label>
            </div>
            <div class="stat">
                <span id="completedCount">0</span>
                <label>Выполнено</label>
            </div>
            <div class="stat">
                <span id="pendingCount">0</span>
                <label>В процессе</label>
            </div>
        </section>

        <section class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="pending">В процессе</button>
            <button class="filter-btn" data-filter="completed">Выполнено</button>
        </section>

        <section class="todo-list" id="todoList">
            <div class="loading">Загрузка...</div>
        </section>
    </div>

    <!-- Модальное окно для редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Редактировать задачу</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="text" id="editTitle" placeholder="Название" required>
                <input type="text" id="editDescription" placeholder="Описание">
                <label class="checkbox-label">
                    <input type="checkbox" id="editCompleted">
                    Выполнено
                </label>
                <button type="submit">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
